services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smart_factory
      POSTGRES_USER: smart_factory
      POSTGRES_PASSWORD: smart_factory
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./internal/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_factory -d smart_factory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
